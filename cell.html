<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />

    name="viewport"

  <title>VR Cell Explorer - Phase 1</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>

  <script>
    /**
     * 左スティックによる移動
     * カメラの向いている方向を基準に前後左右へ移動する。
     */
    /**
 * 左スティックによる前後左右移動
 * Xボタンで上昇、Yボタンで下降
 */
AFRAME.registerComponent("quest-move", {
  schema: {
    speed: {
      type: "number",
      default: 0.004
    },

    verticalSpeed: {
      type: "number",
      default: 0.004
    }
  },

  init() {
    // 左スティックの入力値
    this.moveX = 0;
    this.moveY = 0;

    // 上下移動ボタンの状態
    this.moveUp = false;
    this.moveDown = false;

    this.leftHand = document.querySelector("#leftHand");

    if (!this.leftHand) {
      console.warn("leftHand が見つかりません");
      return;
    }

    // 左スティック
    this.leftHand.addEventListener("thumbstickmoved", (event) => {
      this.moveX = event.detail.x;
      this.moveY = event.detail.y;
    });

    // Xボタン：上昇
    this.leftHand.addEventListener("xbuttondown", () => {
      this.moveUp = true;
    });

    this.leftHand.addEventListener("xbuttonup", () => {
      this.moveUp = false;
    });

    // Yボタン：下降
    this.leftHand.addEventListener("ybuttondown", () => {
      this.moveDown = true;
    });

    this.leftHand.addEventListener("ybuttonup", () => {
      this.moveDown = false;
    });
  },

  tick(time, deltaTime) {
    const camera = document.querySelector("#camera");

    if (!camera) {
      return;
    }

    const rigObject = this.el.object3D;
    const cameraObject = camera.object3D;

    /*
     * 前後方向を取得
     * 頭の上下角度は移動方向に反映しない
     */
    const forward = new THREE.Vector3();

    cameraObject.getWorldDirection(forward);

    forward.y = 0;

    // 真上・真下を向いたときの対策
    if (forward.lengthSq() > 0.0001) {
      forward.normalize();
    } else {
      forward.set(0, 0, -1);
    }

    /*
     * 右方向を取得
     */
    const right = new THREE.Vector3()
      .crossVectors(
        forward,
        new THREE.Vector3(0, 1, 0)
      )
      .normalize();

    /*
     * 前後左右の移動量
     */
    const movement = new THREE.Vector3();

    if (
      Math.abs(this.moveX) >= 0.1 ||
      Math.abs(this.moveY) >= 0.1
    ) {
      movement.addScaledVector(
        forward,
        this.moveY * this.data.speed * deltaTime
      );

      movement.addScaledVector(
        right,
        -this.moveX * this.data.speed * deltaTime
      );

      rigObject.position.add(movement);
    }

    /*
     * Xボタンで上昇
     */
    if (this.moveUp) {
      rigObject.position.y +=
        this.data.verticalSpeed * deltaTime;
    }

    /*
     * Yボタンで下降
     */
    if (this.moveDown) {
      rigObject.position.y -=
        this.data.verticalSpeed * deltaTime;
    }
  },

  remove() {
    /*
     * コンポーネント削除時に入力状態をリセット
     */
    this.moveX = 0;
    this.moveY = 0;
    this.moveUp = false;
    this.moveDown = false;
  }
});

    /**
     * 右スティックによる視点回転
     */
    AFRAME.registerComponent("quest-look", {
      schema: {
        speed: {
          type: "number",
          default: 0.002
        }
      },

      init() {
        this.lookX = 0;

        const rightHand = document.querySelector("#rightHand");

        if (!rightHand) {
          console.warn("rightHand が見つかりません");
          return;
        }

        rightHand.addEventListener("thumbstickmoved", (event) => {
          this.lookX = event.detail.x;
        });
      },

      tick(time, deltaTime) {
        if (Math.abs(this.lookX) < 0.15) {
          return;
        }

        this.el.object3D.rotation.y -=
          this.lookX * this.data.speed * deltaTime;
      }
    });

    /**
     * ミトコンドリア風オブジェクトを複数作成
     * Phase1では細胞内らしさを確認するための仮表示。
     */
    AFRAME.registerComponent("create-organelles", {
      init() {
        const organelles = [
          { position: "-6 1 -1", rotation: "20 30 10", scale: "1.7 0.7 0.7" },
          { position: "5 3 -3", rotation: "-10 50 20", scale: "1.5 0.6 0.6" },
          { position: "-4 -3 -5", rotation: "40 -20 10", scale: "1.8 0.7 0.7" },
          { position: "6 -2 1", rotation: "10 70 -20", scale: "1.4 0.6 0.6" },
          { position: "2 5 2", rotation: "-30 10 30", scale: "1.6 0.65 0.65" },
          { position: "-7 4 3", rotation: "20 -40 15", scale: "1.4 0.55 0.55" }
        ];

        organelles.forEach((data) => {
          const mitochondrion = document.createElement("a-entity");

          mitochondrion.setAttribute("geometry", {
            primitive: "sphere",
            segmentsWidth: 32,
            segmentsHeight: 20
          });

          mitochondrion.setAttribute("material", {
            color: "#ff8c69",
            roughness: 0.65,
            metalness: 0.05
          });

          mitochondrion.setAttribute("position", data.position);
          mitochondrion.setAttribute("rotation", data.rotation);
          mitochondrion.setAttribute("scale", data.scale);

          this.el.appendChild(mitochondrion);
        });
      }
    });

    /**
     * 現在位置の表示
     * PC確認時とVRデバッグ用。
     */
    AFRAME.registerComponent("position-monitor", {
      tick() {
        const text = document.querySelector("#positionText");

        if (!text) {
          return;
        }

        const position = this.el.object3D.position;

        text.setAttribute(
          "value",
          `Position\nx: ${position.x.toFixed(1)}\ny: ${position.y.toFixed(1)}\nz: ${position.z.toFixed(1)}`
        );
      }
    });

   /**
 * 核との距離を監視し、近づいたときだけ入口UIを表示する。
 */
/**
 * 核との距離を監視し、近づいたときだけ入口UIを表示する。
 */
AFRAME.registerComponent("nucleus-proximity", {
  schema: {
    target: {
      type: "selector"
    },

    showDistance: {
      type: "number",
      default: 9
    },

    hideDistance: {
      type: "number",
      default: 11
    }
  },

  init() {
    this.isVisible = false;
    this.hideTimer = null;

    this.enterPanel = document.querySelector("#enterNucleusPanel");
    this.distanceText = document.querySelector("#nucleusDistanceText");
    this.camera = document.querySelector("#camera");

    this.playerWorldPosition = new THREE.Vector3();
    this.targetWorldPosition = new THREE.Vector3();

    if (!this.data.target) {
      console.warn("核のターゲットが設定されていません");
    }

    if (!this.camera) {
      console.warn("camera が見つかりません");
    }

    if (!this.enterPanel) {
      console.warn("enterNucleusPanel が見つかりません");
    }
  },

  tick() {
    if (
      !this.data.target ||
      !this.enterPanel ||
      !this.camera
    ) {
      return;
    }

    // Questではrigではなく、実際のカメラ位置を取得する
    this.camera.object3D.getWorldPosition(
      this.playerWorldPosition
    );

    this.data.target.object3D.getWorldPosition(
      this.targetWorldPosition
    );

    const distance = this.playerWorldPosition.distanceTo(
      this.targetWorldPosition
    );

    if (this.distanceText) {
      this.distanceText.setAttribute(
        "value",
        `Distance to nucleus: ${distance.toFixed(1)} m`
      );
    }

    if (
      !this.isVisible &&
      distance <= this.data.showDistance
    ) {
      this.showPanel();
    }

    if (
      this.isVisible &&
      distance >= this.data.hideDistance
    ) {
      this.hidePanel();
    }
  },

  showPanel() {
    this.isVisible = true;

    // 過去の非表示タイマーが残っていたら停止する
    if (this.hideTimer) {
      clearTimeout(this.hideTimer);
      this.hideTimer = null;
    }

    // カメラの位置と向きを取得する
    const cameraPosition = new THREE.Vector3();
    const cameraDirection = new THREE.Vector3();

    this.camera.object3D.getWorldPosition(
      cameraPosition
    );

    this.camera.object3D.getWorldDirection(
      cameraDirection
    );

    cameraDirection.normalize();

    // カメラの2.5m前にUIを配置する
    const panelPosition = cameraPosition
      .clone()
      .add(
        cameraDirection.multiplyScalar(2.5)
      );

    this.enterPanel.object3D.position.copy(
      panelPosition
    );

    // 古い非表示アニメーションを削除する
    this.enterPanel.removeAttribute(
      "animation__hide"
    );

    this.enterPanel.setAttribute(
      "visible",
      true
    );

    this.enterPanel.setAttribute(
      "scale",
      "0.001 0.001 0.001"
    );

    this.enterPanel.setAttribute(
      "animation__show",
      {
        property: "scale",
        from: "0.001 0.001 0.001",
        to: "1 1 1",
        dur: 250,
        easing: "easeOutBack"
      }
    );
  },

  hidePanel() {
    this.isVisible = false;

    // 古い表示アニメーションを削除する
    this.enterPanel.removeAttribute(
      "animation__show"
    );

    this.enterPanel.setAttribute(
      "animation__hide",
      {
        property: "scale",
        from: "1 1 1",
        to: "0.001 0.001 0.001",
        dur: 180,
        easing: "easeInQuad"
      }
    );

    if (this.hideTimer) {
      clearTimeout(this.hideTimer);
    }

    this.hideTimer = setTimeout(() => {
      if (!this.isVisible) {
        this.enterPanel.setAttribute(
          "visible",
          false
        );
      }

      this.hideTimer = null;
    }, 180);
  }
});

/**
 * 核内シーンへ移動するボタン。
 */
AFRAME.registerComponent("enter-nucleus", {
  init() {
    this.isLoading = false;

    this.el.addEventListener("click", () => {
      this.enterNucleus();
    });

    this.el.addEventListener("mouseenter", () => {
      this.el.setAttribute("material", "color", "#b77cff");
      this.el.setAttribute("scale", "1.05 1.05 1.05");
    });

    this.el.addEventListener("mouseleave", () => {
      this.el.setAttribute("material", "color", "#8f52d9");
      this.el.setAttribute("scale", "1 1 1");
    });
  },

  enterNucleus() {
    if (this.isLoading) {
      return;
    }

    this.isLoading = true;

    const loadingPanel = document.querySelector("#loadingPanel");
    const enterPanel = document.querySelector("#enterNucleusPanel");

    if (enterPanel) {
      enterPanel.setAttribute("visible", false);
    }

    if (loadingPanel) {
      loadingPanel.setAttribute("visible", true);
      loadingPanel.setAttribute("scale", "1 1 1");
    }

    setTimeout(() => {
  const rig = document.querySelector("#rig");
  const cellLayer = document.querySelector("#cellLayer");
  const chromosomeLayer = document.querySelector("#chromosomeLayer");
  const enterPanel = document.querySelector("#enterNucleusPanel");
  const loadingPanel = document.querySelector("#loadingPanel");

  // 細胞表示を消す
  if (cellLayer) {
    cellLayer.setAttribute("visible", false);
  }

  // 核内・染色体表示を出す
  if (chromosomeLayer) {
    chromosomeLayer.setAttribute("visible", true);
  }

  // UIを消す
  if (enterPanel) {
    enterPanel.setAttribute("visible", false);
  }

  if (loadingPanel) {
    loadingPanel.setAttribute("visible", false);
  }

  // プレイヤーを核内表示の開始位置へ移動
  if (rig) {
    rig.object3D.position.set(0, 1.6, 10);
    rig.object3D.rotation.set(0, 0, 0);
  }
}, 700);
  }
});


/**
 * Questの右トリガーで、レーザーが指しているクリック可能物を押す。
 */
AFRAME.registerComponent("trigger-click", {
  init() {
    this.el.addEventListener("triggerdown", () => {
      const raycaster = this.el.components.raycaster;

      if (!raycaster) {
        return;
      }

      const intersections = raycaster.intersections;

      if (!intersections || intersections.length === 0) {
        return;
      }

      const target = intersections[0].object.el;

      if (
        target &&
        target.classList.contains("clickable")
      ) {
        target.emit("click");
      }
    });
  }
});

/**
 * プレイヤーを核の中心へ自動移動させる演出。
 */
AFRAME.registerComponent("nucleus-transition", {
  schema: {
    target: {
      type: "selector"
    },
    duration: {
      type: "number",
      default: 1800
    }
  },

  init() {
    this.isTransitioning = false;
    this.startPosition = new THREE.Vector3();
    this.endPosition = new THREE.Vector3();
    this.startTime = 0;

    this.fadePanel = document.querySelector("#fadePanel");
  },

  startTransition() {
    if (this.isTransitioning || !this.data.target) {
      return;
    }

    this.isTransitioning = true;
    this.startTime = performance.now();

    // 現在のrig位置を保存
    this.startPosition.copy(this.el.object3D.position);

    // 核のワールド座標を取得
    this.data.target.object3D.getWorldPosition(this.endPosition);

    // カメラの高さを考慮して、核中心より少し上へ移動
    this.endPosition.y += 1.6;

    // 移動操作を止める
    const moveComponent = this.el.components["quest-move"];

    if (moveComponent) {
      moveComponent.moveX = 0;
      moveComponent.moveY = 0;
    }
  },

  tick() {
    if (!this.isTransitioning) {
      return;
    }

    const elapsed = performance.now() - this.startTime;
    const progress = Math.min(elapsed / this.data.duration, 1);

    // 滑らかな加減速
    const easedProgress =
      progress < 0.5
        ? 2 * progress * progress
        : 1 - Math.pow(-2 * progress + 2, 2) / 2;

    this.el.object3D.position.lerpVectors(
      this.startPosition,
      this.endPosition,
      easedProgress
    );

    // 終盤で暗転開始
    if (progress >= 0.65 && this.fadePanel) {
      const fadeProgress = (progress - 0.65) / 0.35;

      this.fadePanel.setAttribute("material", {
        color: "#000000",
        opacity: Math.min(fadeProgress, 1),
        transparent: true,
        shader: "flat"
      });

      this.fadePanel.setAttribute("visible", true);
    }

    if (progress >= 1) {
      this.isTransitioning = false;

      setTimeout(() => {
        window.location.href = "realchromosome.html";
      }, 250);
    }
  }
});

}

  </script>
</head>

  visible="false"
  scale="0.001 0.001 0.001"
>
  <a-plane
    width="4"
    height="1.4"
    material="
      color: #080611;
      opacity: 0.95;
      transparent: true;
      shader: flat
    "
  ></a-plane>

  <a-text
    value="Entering nucleus..."
    position="0 0.15 0.02"
    align="center"
    width="3.5"
    color="#ffffff"
  ></a-text>

  <a-ring
    position="0 -0.35 0.03"
    radius-inner="0.12"
    radius-outer="0.18"
    theta-length="270"
    material="
      color: #cf92ff;
      shader: flat
    "
    animation="
      property: rotation;
      to: 0 0 -360;
      loop: true;
      dur: 900;
      easing: linear
    "
  ></a-ring>
</a-entity>
    <!-- ============================= -->
    <!-- ラベル -->
    <!-- ============================= -->

    <a-entity
      position="0 7.2 -1"
      text="
        value: Nucleus;
        align: center;
        width: 6;
        color: #ffffff
      "
    ></a-entity>

    <a-entity
      position="0 11.5 0"
      text="
        value: Cell Membrane;
        align: center;
        width: 7;
        color: #aeefff
      "
    ></a-entity>

    <!-- ============================= -->
    <!-- 操作用Rig -->
    <!-- ============================= -->

    <a-entity
  id="rig"
  position="0 1.6 17"
  quest-move
  quest-look
  position-monitor
  nucleus-proximity="
    target: #nucleus;
    showDistance: 7;
    hideDistance: 8
  "
>
      <a-camera
        id="camera"
        position="0 0 0"
        look-controls="pointerLockEnabled: true"
        wasd-controls="acceleration: 35"
      >
        <!-- PC用カーソル -->
        <a-cursor
          color="#ffffff"
          fuse="false"
          raycaster="objects: .clickable"
        ></a-cursor>

        <!-- 位置表示 -->
        <a-entity
          id="positionText"
          position="-0.75 -0.45 -1.3"
          text="
            value: Position;
            width: 1.3;
            color: #ffffff;
            align: left
          "
        ></a-entity>

        <!-- 操作説明 -->
        <a-entity
          position="0 -0.65 -1.5"
          text="
            value: Left stick / WASD: Move\nRight stick / Mouse: Look;
            align: center;
            width: 1.8;
            color: #dce8ff
          "
        ></a-entity>
      </a-camera>

      <a-entity
        id="leftHand"
        laser-controls="hand: left"
        raycaster="objects: .clickable"
      ></a-entity>

      <a-entity
  id="rightHand"
  laser-controls="hand: right"
  raycaster="
    objects: .clickable;
    far: 50;
    showLine: true
  "
  trigger-click
></a-entity>
</a-entity> 

    <!-- 床の目印 -->
    <a-circle
      position="0 -11.8 0"
      rotation="-90 0 0"
      radius="4"
      material="
        color: #253755;
        opacity: 0.35;
        transparent: true;
        side: double
      "
    ></a-circle>

    <!-- 周囲の空間 -->
    <a-sky color="#02030a"></a-sky>
  </a-scene>
</body>
</html>
