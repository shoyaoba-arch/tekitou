<script>
/* ===============================
   H: up / B: down
=============================== */
/* ===============================
   CNA chromosome count
=============================== */

const chrCNAcount = {};
AFRAME.registerComponent('keyboard-move', {
  init() {
    this.keys = {};
    window.addEventListener('keydown', e => this.keys[e.code] = true);
    window.addEventListener('keyup',   e => this.keys[e.code] = false);
  },
  tick(t, dt) {
    const p = this.el.object3D.position;
    const s = dt * 0.004;
    if (this.keys['KeyH']) p.y += s;
    if (this.keys['KeyB']) p.y -= s;
  }
});

/* ===============================
   ラベル前面
=============================== */
AFRAME.registerComponent('always-on-top-text', {
  schema: { renderOrder: { type: 'number', default: 9999 } },
  tick() {
    const ro = this.data.renderOrder;
    const obj = this.el.object3D;
    if (!obj) return;
    obj.renderOrder = ro;
    obj.traverse((child) => {
      child.renderOrder = ro;
      if (child.material) {
        const mats = Array.isArray(child.material) ? child.material : [child.material];
        mats.forEach(m => {
          m.depthTest = false;
          m.depthWrite = false;
          m.transparent = true;
          m.needsUpdate = true;
        });
      }
    });
  }
});

/* ===============================
   自前 line（aframe-line-component衝突回避）
=============================== */
AFRAME.registerComponent('vrline', {
  schema: {
    start: { type: 'vec3' },
    end:   { type: 'vec3' },
    color: { type: 'color', default: '#777' },
    opacity: { type: 'number', default: 0.6 }
  },
  init() {
    const material = new THREE.LineBasicMaterial({
      color: new THREE.Color(this.data.color),
      transparent: true,
      opacity: this.data.opacity
    });
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(6);
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    this.line = new THREE.Line(geometry, material);
    this.el.setObject3D('mesh', this.line);
    this.update();
  },
  update() {
    if (!this.line) return;
    const { start, end, color, opacity } = this.data;
    const pos = this.line.geometry.attributes.position.array;
    pos[0]=start.x; pos[1]=start.y; pos[2]=start.z;
    pos[3]=end.x;   pos[4]=end.y;   pos[5]=end.z;
    this.line.geometry.attributes.position.needsUpdate = true;
    this.line.material.color = new THREE.Color(color);
    this.line.material.opacity = opacity;
    this.line.material.needsUpdate = true;
  },
  remove() {
    this.el.removeObject3D('mesh');
  }
});

/* ===============================
   helpers
=============================== */
/* ===============================
   CNA (Fisher検定) 読み込み
=============================== */

async function loadCNA(){
  try{
    const txt = await fetchText('./fisher_exact_results.csv');
    const rows = parseCSV(txt);

    const cna = {};

    rows.forEach(r=>{
      const gene = keyUpper(r.Gene);
      const p = Number(r.p_value);

      if(!gene) return;

      cna[gene] = {
        p: p,
        significant: (p <= 0.05)
      };
    });

    return cna;

  }catch(e){
    console.warn("CNA file not found");
    return {};
  }
}
const info = document.getElementById('info');
function safeNum(v, fallback=null){
  const x = Number(v);
  return Number.isFinite(x) ? x : fallback;
}
function keyUpper(x){ return String(x ?? '').trim().toUpperCase(); }
function isBlank(v){ return v == null || String(v).trim() === ''; }

// GRCh38の概算長（bp）: 1..22（座標を棒上にマッピング）
const CHR_LEN = {
  "1":248956422,"2":242193529,"3":198295559,"4":190214555,"5":181538259,"6":170805979,
  "7":159345973,"8":145138636,"9":138394717,"10":133797422,"11":135086622,"12":133275309,
  "13":114364328,"14":107043718,"15":101991189,"16":90338345,"17":83257441,"18":80373285,
  "19":58617616,"20":64444167,"21":46709983,"22":50818468
};
function genomeCoordToVR(chr, start, end, tubes, layer = "gene") {
  chr = String(chr).replace("chr", "");

  const shape = chrShapeMap[chr];
  if (!shape || !CHR_LEN[chr]) return null;

  const mid = (Number(start) + Number(end)) / 2;
  const t = clamp01(mid / CHR_LEN[chr]);

  const arm =
    shape.arms.find(a => t >= a.startT && t <= a.endT) ||
    shape.arms[0];

  const localT = (t - arm.startT) / (arm.endT - arm.startT);
  const p = arm.curve.getPointAt(localT);

  const seed = Math.sin(mid * 0.00001) * 10000;
  const rand1 = seed - Math.floor(seed);
  const rand2 = Math.sin(seed * 3.17) * 10000;
  const rand3 = rand2 - Math.floor(rand2);

  const theta = rand1 * Math.PI * 2;

  const radius =
    Math.sqrt(rand3) *
    shape.armR *
    (layer === "loop" ? 0.15 : 0.65);

  const offset = new THREE.Vector3(
    Math.cos(theta) * radius,
    Math.sin(theta) * radius,
    Math.sin(t * 40) * shape.armR * 0.12
  );

  return {
    x: shape.cx + p.x + offset.x,
    y: shape.cy + p.y + offset.y,
    z: shape.cz + p.z + offset.z
  };
}

function createLocalChromosomeRegion(scene, chr, start, end, tubes, color = '#00FF99') {
  chr = String(chr).replace("chr", "");

  const shape = chrShapeMap[chr];
  if (!shape || !CHR_LEN[chr]) return null;

  const t1 = clamp01(Number(start) / CHR_LEN[chr]);
  const t2 = clamp01(Number(end) / CHR_LEN[chr]);

  const midT = (t1 + t2) / 2;

  const arm =
    shape.arms.find(a => midT >= a.startT && midT <= a.endT) ||
    shape.arms[0];

  const localT1 = clamp01((t1 - arm.startT) / (arm.endT - arm.startT));
  const localT2 = clamp01((t2 - arm.startT) / (arm.endT - arm.startT));

  const fromT = Math.min(localT1, localT2);
  const toT = Math.max(localT1, localT2);

  const points = [];

  for (let i = 0; i <= 18; i++) {
    const tt = fromT + (toT - fromT) * (i / 18);
    const p = arm.curve.getPointAt(tt);

    points.push(
      new THREE.Vector3(
        shape.cx + p.x,
        shape.cy + p.y,
        shape.cz + p.z
      )
    );
  }

  if (points.length < 2) return null;

  const curve = new THREE.CatmullRomCurve3(points);

  const geo = new THREE.TubeGeometry(
    curve,
    36,
    shape.armR * 1.08,
    24,
    false
  );

  const mat = new THREE.MeshPhysicalMaterial({
    color: new THREE.Color(color),
    transparent: true,
    opacity: 0.42,
    roughness: 0.8,
    metalness: 0.02,
    emissive: new THREE.Color(color),
    emissiveIntensity: 0.75,
    depthTest: false,
    depthWrite: false
  });

  const mesh = new THREE.Mesh(geo, mat);
  mesh.renderOrder = 9000;

  const entity = document.createElement('a-entity');
  entity.setObject3D('mesh', mesh);
  scene.appendChild(entity);

  const center = points[Math.floor(points.length / 2)].clone();

  return {
    entity,
    mesh,
    chr,
    start: Number(start),
    end: Number(end),
    center,
    genes: []
  };
}
function bendLocalRegionToward(region, targetCenter, strength = 0.55) {
  if (!region || !region.mesh || !region.center) return;

  const geo = region.mesh.geometry;
  const pos = geo.attributes.position;

  const dir = targetCenter.clone().sub(region.center);
  if (dir.length() === 0) return;

  dir.normalize();

  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i);
    const y = pos.getY(i);
    const z = pos.getZ(i);

    const worldP = new THREE.Vector3(x, y, z);

    const distFromCenter = worldP.distanceTo(region.center);

    const bendWeight = Math.exp(-distFromCenter * 0.35);

    const moveAmount = strength * bendWeight;

    worldP.add(dir.clone().multiplyScalar(moveAmount));

    pos.setXYZ(i, worldP.x, worldP.y, worldP.z);
  }

  pos.needsUpdate = true;
  geo.computeVertexNormals();

  region.mesh.material.emissiveIntensity = 1.5;
  region.mesh.material.opacity = 0.65;
  region.mesh.material.needsUpdate = true;
}
function clamp01(x){ return Math.max(0, Math.min(1, x)); }
function lerp(a,b,t){ return a + (b-a)*t; }

/* ===============================
   データ列名の自動検出
=============================== */
function pickCol(rowObj, candidates){
  // candidates: ["display","Display","gene",...]
  for (const c of candidates){
    if (rowObj[c] != null && !isBlank(rowObj[c])) return c;
    // 大文字小文字を無視
    const hit = Object.keys(rowObj).find(k => k.toLowerCase() === c.toLowerCase());
    if (hit && !isBlank(rowObj[hit])) return hit;
  }
  return null;
}

function findColFuzzy(rowObj, regexList){
  const keys = Object.keys(rowObj);
  for (const re of regexList){
    const hit = keys.find(k => re.test(k));
    if (hit) return hit;
  }
  return null;
}

/* ===============================
   色モード
=============================== */
const ColorMode = {
  HR_ON:  "HR_ON",
  HR_OFF: "HR_OFF",
  DELTA:  "DELTA"
};
let colorMode = ColorMode.HR_ON;

function colorForGene(node){
  // node: {hr_on, hr_off, deltaHR}
  if (colorMode === ColorMode.DELTA){
    const d = safeNum(node.deltaHR, null);
    if (d == null) return '#33CC66';           // NA
    return (d >= 0) ? '#FF3333' : '#3366FF';   // >=0 赤 / <0 青
  }
  const hr = (colorMode === ColorMode.HR_ON) ? safeNum(node.hr_on, null) : safeNum(node.hr_off, null);
  if (hr == null) return '#33CC66';           // NA
  return (hr >= 1.0) ? '#FF3333' : '#3366FF'; // >=1 赤 / <1 青
}

function modeLabel(){
  if (colorMode === ColorMode.HR_ON)  return 'HR(ET〇)';
  if (colorMode === ColorMode.HR_OFF) return 'HR(ET×)';
  return 'ΔHR(>=0/<0)';
}

/* ===============================
   染色体モデル（あなたのデザインを踏襲）
=============================== */

function colorForChromosome(chrNum) {
  const colors = [
    '#8F6AFF', '#FF6B6B', '#4D96FF', '#6BCB77', '#FFD93D',
    '#FF9F1C', '#B983FF', '#00C2A8', '#F15BB5', '#9B5DE5',
    '#00BBF9', '#FEE440', '#EF476F', '#06D6A0', '#118AB2',
    '#FFB703', '#FB8500', '#8338EC', '#3A86FF', '#FF006E',
    '#A7C957', '#BC6C25'
  ];

  return colors[(Number(chrNum) - 1) % colors.length];
}

const chrShapeMap = {};
const glowRegionMeta = [];
const localRegionMeta = [];
let localRegionMoved = false;

function createGlowTubeForRegion(scene, chr, start, end, color = '#00FF99') {
  chr = String(chr).replace("chr", "");

  const shape = chrShapeMap[chr];
  if (!shape || !CHR_LEN[chr]) return null;

  const t1 = clamp01(Number(start) / CHR_LEN[chr]);
  const t2 = clamp01(Number(end) / CHR_LEN[chr]);
  const midT = (t1 + t2) / 2;

  const arm =
    shape.arms.find(a => midT >= a.startT && midT <= a.endT) ||
    shape.arms[0];

  const localT1 = clamp01((t1 - arm.startT) / (arm.endT - arm.startT));
  const localT2 = clamp01((t2 - arm.startT) / (arm.endT - arm.startT));

  const fromT = Math.min(localT1, localT2);
  const toT = Math.max(localT1, localT2);

  const points = [];

  for (let i = 0; i <= 20; i++) {
    const tt = fromT + (toT - fromT) * (i / 20);
    const p = arm.curve.getPointAt(tt);

    points.push(
      new THREE.Vector3(
        shape.cx + p.x,
        shape.cy + p.y,
        shape.cz + p.z
      )
    );
  }

  if (points.length < 2) return null;

  const curve = new THREE.CatmullRomCurve3(points);

  const geo = new THREE.TubeGeometry(
    curve,
    40,
    shape.armR * 1.18,
    24,
    false
  );

  const mat = new THREE.MeshBasicMaterial({
    color: new THREE.Color(color),
    transparent: true,
    opacity: 0.55,
    depthTest: false,
    depthWrite: false
  });

  const mesh = new THREE.Mesh(geo, mat);
  mesh.renderOrder = 9997;
  mesh.visible = false;

  const entity = document.createElement('a-entity');
  entity.setObject3D('mesh', mesh);
  scene.appendChild(entity);

  return {
    entity,
    mesh,
    chr,
    start: Number(start),
    end: Number(end)
  };
}

function drawRealisticChromosome(scene, chrNum, cx, cy, cz, chrLen, chrR, chrCNAcount) {
  const group = document.createElement('a-entity');
  group.setAttribute('id', `chrGroup_${chrNum}`);
  group.setAttribute('position', `${cx} ${cy} ${cz}`);
  scene.appendChild(group);
  const chrColor = colorForChromosome(chrNum);

  const armLen = chrLen * 0.42;
  const armR = chrR * 0.55;

  const armData = [
    {
      name: 'p1',
      startT: 0.00,
      endT: 0.25,
      points: [
        [-armLen * 0.95,  armLen * 0.95, 0.00],
        [-armLen * 0.55,  armLen * 0.45, 0.15],
        [-armLen * 0.18,  armLen * 0.12, 0.05],
        [0, 0, 0]
      ]
    },
    {
      name: 'p2',
      startT: 0.25,
      endT: 0.50,
      points: [
        [0, 0, 0],
        [armLen * 0.18,  armLen * 0.12, -0.05],
        [armLen * 0.55,  armLen * 0.45,  0.10],
        [armLen * 0.95,  armLen * 0.95,  0.00]
      ]
    },
    {
      name: 'q1',
      startT: 0.50,
      endT: 0.75,
      points: [
        [-armLen * 0.95, -armLen * 0.95, 0.00],
        [-armLen * 0.55, -armLen * 0.45, -0.15],
        [-armLen * 0.18, -armLen * 0.12, -0.05],
        [0, 0, 0]
      ]
    },
    {
      name: 'q2',
      startT: 0.75,
      endT: 1.00,
      points: [
        [0, 0, 0],
        [armLen * 0.18, -armLen * 0.12,  0.05],
        [armLen * 0.55, -armLen * 0.45, -0.10],
        [armLen * 0.95, -armLen * 0.95,  0.00]
      ]
    }
  ];

  chrShapeMap[String(chrNum)] = {
  cx, cy, cz,
  chrLen,
  chrR,
  armLen,
  armR,
  group,
  arms: []
};

  armData.forEach((a, index) => {
    const curve = new THREE.CatmullRomCurve3(
      a.points.map(p => new THREE.Vector3(p[0], p[1], p[2]))
    );

    chrShapeMap[String(chrNum)].arms.push({
      name: a.name,
      startT: a.startT,
      endT: a.endT,
      curve
    });

    const geometry = new THREE.TubeGeometry(
      curve,
      180,
      armR,
      32,
      false
    );

    addChromosomeSurfaceNoise(geometry, index);

    const material = new THREE.MeshPhysicalMaterial({

    color: new THREE.Color(chrColor),

    roughness:0.85,

    metalness:0.02,

    transmission:0.12,

    transparent:true,

    opacity:0.2,

    emissive:new THREE.Color(chrColor),

    emissiveIntensity:0.25

});

    const mesh = new THREE.Mesh(geometry, material);
    group.object3D.add(mesh);
    chrShapeMap[String(chrNum)].arms[index].mesh = mesh;
    chrShapeMap[String(chrNum)].arms[index].geometry = geometry;
    chrShapeMap[String(chrNum)].arms[index].basePositions =
      geometry.attributes.position.array.slice();

    createChromosomeBands(group, curve, armR);
  });

  const centerGeo = new THREE.SphereGeometry(chrR * 0.85, 32, 32);
  const centerMat = new THREE.MeshStandardMaterial({
    color: new THREE.Color(chrColor)
,
    roughness: 1,
    metalness: 0,
    emissive: 0x230033,
    emissiveIntensity: 0.7
  });

  const center = new THREE.Mesh(centerGeo, centerMat);
  center.scale.set(1.0, 0.75, 0.75);
  group.object3D.add(center);

  const cnaCount = chrCNAcount?.[chrNum] || 0;

  if (cnaCount > 0) {
    group.setAttribute('animation__pulse', {
      property: 'scale',
      dir: 'alternate',
      dur: 1000,
      loop: true,
      to: '1.04 1.04 1.04'
    });
  }

  return group;
}

function restoreChromosomeBodies(){

    Object.values(chrShapeMap).forEach(chr=>{

        chr.arms.forEach(arm=>{

            if(!arm.geometry || !arm.basePositions) return;

            const pos=arm.geometry.attributes.position;
            const base=arm.basePositions;

            for(let i=0;i<pos.count;i++){

                pos.setXYZ(
                    i,
                    base[i*3],
                    base[i*3+1],
                    base[i*3+2]
                );

            }

            pos.needsUpdate=true;
            arm.geometry.computeVertexNormals();

            if(arm.mesh){

                arm.mesh.material.opacity=0.2;
                arm.mesh.material.emissiveIntensity=0.25;
                arm.mesh.material.needsUpdate=true;

            }

        });

    });

}

function restoreGenePositions(){

    Object.values(nodeMeta).forEach(n=>{

        if(!n.originalPosition) return;

        n.sphere.setAttribute(
            "position",
            `${n.originalPosition.x}
             ${n.originalPosition.y}
             ${n.originalPosition.z}`
        );

        n.label.setAttribute(
            "position",
            `${n.originalPosition.x}
             ${n.originalPosition.y+0.4}
             ${n.originalPosition.z}`
        );

    });

}

function bendChromosomeBodyRegion(chr, start, end, targetChr, targetStart, targetEnd, strength = 0.75) {
  chr = String(chr).replace("chr", "");
  targetChr = String(targetChr).replace("chr", "");

  const shape = chrShapeMap[chr];
  const targetShape = chrShapeMap[targetChr];

  if (!shape || !targetShape || !CHR_LEN[chr] || !CHR_LEN[targetChr]) return;

  const mid = (Number(start) + Number(end)) / 2;
  const targetMid = (Number(targetStart) + Number(targetEnd)) / 2;

  const t = clamp01(mid / CHR_LEN[chr]);
  const targetT = clamp01(targetMid / CHR_LEN[targetChr]);

  const arm = shape.arms.find(a => t >= a.startT && t <= a.endT);
  const targetArm = targetShape.arms.find(a => targetT >= a.startT && targetT <= a.endT);

  if (!arm || !targetArm || !arm.geometry || !arm.basePositions) return;

  const localT = (t - arm.startT) / (arm.endT - arm.startT);
  const targetLocalT = (targetT - targetArm.startT) / (targetArm.endT - targetArm.startT);

  const localCenter = arm.curve.getPointAt(localT);
  const targetLocalCenter = targetArm.curve.getPointAt(targetLocalT);

  const worldCenter = new THREE.Vector3(
    shape.cx + localCenter.x,
    shape.cy + localCenter.y,
    shape.cz + localCenter.z
  );

  const worldTarget = new THREE.Vector3(
    targetShape.cx + targetLocalCenter.x,
    targetShape.cy + targetLocalCenter.y,
    targetShape.cz + targetLocalCenter.z
  );

  const dir = worldTarget.clone().sub(worldCenter);
  if (dir.length() === 0) return;

  dir.normalize();

  const pos = arm.geometry.attributes.position;
  const base = arm.basePositions;

  const regionLength = shape.armLen * 0.12;

  for (let i = 0; i < pos.count; i++) {
    const bx = base[i * 3];
    const by = base[i * 3 + 1];
    const bz = base[i * 3 + 2];

    const vertexLocal = new THREE.Vector3(bx, by, bz);

    const d = vertexLocal.distanceTo(localCenter);

    const weight = Math.exp(-(d * d) / (regionLength * regionLength));

    const move = strength * weight;

    pos.setXYZ(
      i,
      bx + dir.x * move,
      by + dir.y * move,
      bz + dir.z * move
    );
  }

  pos.needsUpdate = true;
  arm.geometry.computeVertexNormals();

  if (arm.mesh && arm.mesh.material) {
    arm.mesh.material.emissiveIntensity = 0.85;
    arm.mesh.material.opacity = 0.65;
    arm.mesh.material.needsUpdate = true;
  }
}

function applyHiCBendingToChromosomeBody(erLoops) {
  erLoops.forEach(r => {
    bendChromosomeBodyRegion(
      r.source_chr,
      r.source_start,
      r.source_end,
      r.target_chr,
      r.target_start,
      r.target_end,
      0.9
    );

    bendChromosomeBodyRegion(
      r.target_chr,
      r.target_start,
      r.target_end,
      r.source_chr,
      r.source_start,
      r.source_end,
      0.9
    );

  info.innerHTML += `<br><span class="badge">Chromosome body bending applied</span>`;
}
function addChromosomeSurfaceNoise(geometry, seed) {
  const pos = geometry.attributes.position;

  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i);
    const y = pos.getY(i);
    const z = pos.getZ(i);

    const n =
      Math.sin(x * 14 + seed) *
      Math.sin(y * 12 + seed * 2) *
      Math.sin(z * 10 + seed * 3);

    const scale = 1 + n * 0.075;

    pos.setXYZ(i, x * scale, y * scale, z * scale);
  }

  pos.needsUpdate = true;
  geometry.computeVertexNormals();
}

function createChromosomeBands(group, curve, armR) {
  for (let t = 0.15; t < 0.95; t += 0.18) {
    const p = curve.getPointAt(t);

    const bandGeo = new THREE.TorusGeometry(
      armR * 1.03,
      armR * 0.045,

    );

      color: 0xd8b8ff,
      transparent: true,
      opacity: 0.1,
      emissive: 0x442266,
      emissiveIntensity: 0.35
    });

    const band = new THREE.Mesh(bandGeo, bandMat);
    band.position.copy(p);

    group.object3D.add(band);
  }
}

function geneInsideRegion(gene, region, windowBp = 100000) {
  if (!gene || !region) return false;

  const geneChr = String(gene.chr).replace("chr", "");
  const regionChr = String(region.chr).replace("chr", "");

  if (geneChr !== regionChr) return false;

  return (
    gene.end >= region.start - windowBp &&
    gene.start <= region.end + windowBp
  );
}

/* ===============================
   Chromosome layout (chr1..22)
=============================== */
function drawChromosomeTubes(scene, opts = {}) {
  const {
    cols = 2, rows = 11,
    tubeR = 0.90, rodLen = 11.8,
    xGap = 11.5, yTop = 7.0,
    yStep = null, zPlane = 0.0,
    zStagger = 2.6, padding = 3.0
  } = opts;

  const autoStep = Math.max(
    rodLen * 0.65,
    (2 * tubeR) + padding
);
  const step = (yStep == null) ? autoStep : Math.max(yStep, autoStep);

  const tubes = {};
  for (let c=0; c<cols; c++){
    for (let r=0; r<rows; r++){
      const chrNum = String(c*rows + r + 1);
      if (Number(chrNum) > 22) continue;

      const cx = (c === 0) ? -xGap : xGap;
      const cy = yTop - r * step;
      const cz = zPlane + ((r % 2 === 0) ? 0 : zStagger);

      const maxChrLenBp = CHR_LEN["1"];
      const minVrLen = rodLen * 0.55;
      const maxVrLen = rodLen * 1.25;

      const lenRatio = CHR_LEN[chrNum] / maxChrLenBp;

      const chrLen = minVrLen + (maxVrLen - minVrLen) * lenRatio;

      const chrR = tubeR * (0.85 + 0.20 * lenRatio);

      drawRealisticChromosome(scene, chrNum, cx, cy, cz, chrLen, chrR, chrCNAcount);

      const xEndLeft = cx - chrLen/2 - 1.0;
      const lbl = document.createElement('a-entity');
      lbl.setAttribute('position', `${xEndLeft} ${cy} ${cz}`);
      lbl.setAttribute('text', { value: `chr${chrNum}`, align: 'center', color: '#FFFFFF', width: 6 });
      lbl.setAttribute('look-at', '#cam');
      lbl.setAttribute('always-on-top-text', 'renderOrder: 9999');
      scene.appendChild(lbl);

      tubes[chrNum] = { cx, cy, cz, chrLen, tubeR: chrR };
    }
  }
  return tubes;
}

function drawLine(scene, a, b, color = '#777', opacity = 0.45) {
  const mid = new THREE.Vector3(
    (a.x + b.x) / 2,
    (a.y + b.y) / 2 + 0.8,
    (a.z + b.z) / 2
  );

  const curve = new THREE.CatmullRomCurve3([
    new THREE.Vector3(a.x, a.y, a.z),
    mid,
    new THREE.Vector3(b.x, b.y, b.z)
  ]);

  const points = curve.getPoints(40);
  const geometry = new THREE.BufferGeometry().setFromPoints(points);

  const material = new THREE.LineBasicMaterial({
    color: new THREE.Color(color),
    transparent: true,
    opacity: opacity,
    depthTest: false,
    depthWrite: false
  });

  const line = new THREE.Line(geometry, material);
  line.renderOrder = 9998;

  const e = document.createElement('a-entity');
  e.setObject3D('mesh', line);
  scene.appendChild(e);

  e.updateCurve = function(start, end) {
    const newMid = new THREE.Vector3(
      (start.x + end.x) / 2,
      (start.y + end.y) / 2 + 0.8,
      (start.z + end.z) / 2
    );

    const newCurve = new THREE.CatmullRomCurve3([
      new THREE.Vector3(start.x, start.y, start.z),
      newMid,
      new THREE.Vector3(end.x, end.y, end.z)
    ]);

    const newPoints = newCurve.getPoints(40);
    const pos = line.geometry.attributes.position;

    for (let i = 0; i < newPoints.length; i++) {
      pos.setXYZ(i, newPoints[i].x, newPoints[i].y, newPoints[i].z);
    }

    pos.needsUpdate = true;
  };

  return e;
}

function drawArrowCenter(scene, from, to, color='#00FFFF') {
  const dx = to.x - from.x, dy = to.y - from.y, dz = to.z - from.z;
  const L = Math.sqrt(dx*dx + dy*dy + dz*dz);
  if (L < 1e-6) return [];
  const dir = new THREE.Vector3(dx/L, dy/L, dz/L);
  const mid = new THREE.Vector3((from.x+to.x)/2, (from.y+to.y)/2, (from.z+to.z)/2);

  let up = new THREE.Vector3(0,1,0);
  if (Math.abs(dir.dot(up)) > 0.9) up = new THREE.Vector3(1,0,0);
  const v = new THREE.Vector3().crossVectors(dir, up).normalize();

  const back=0.9, wide=0.6, thick=0.03;
  const tip=mid.clone();
  const base=tip.clone().addScaledVector(dir, -back);
  const left=base.clone().addScaledVector(v,  wide);
  const right=base.clone().addScaledVector(v, -wide);
  const off=v.clone().multiplyScalar(thick);

  const els=[];
  const mk=(a,b)=>{ const e=document.createElement('a-entity');
    e.setAttribute('vrline', { start: a, end: b, color, opacity: 1.0 });
    scene.appendChild(e); els.push(e);
  };
  mk(tip,left); mk(tip.clone().add(off), left.clone().add(off));
  mk(tip,right); mk(tip.clone().add(off), right.clone().add(off));
  return els;
}

function drawTbarCenter(scene, from, to, color='#FF4444') {
  const dx = to.x - from.x, dy = to.y - from.y, dz = to.z - from.z;
  const L = Math.sqrt(dx*dx + dy*dy + dz*dz);
  if (L < 1e-6) return [];
  const dir = new THREE.Vector3(dx/L, dy/L, dz/L);
  const mid = new THREE.Vector3((from.x+to.x)/2, (from.y+to.y)/2, (from.z+to.z)/2);

  let up = new THREE.Vector3(0,1,0);
  if (Math.abs(dir.dot(up)) > 0.9) up = new THREE.Vector3(1,0,0);
  const p = new THREE.Vector3().crossVectors(dir, up).normalize();

  const barLen = 1.2;
  const a = mid.clone().addScaledVector(p, -barLen/2);
  const b = mid.clone().addScaledVector(p,  barLen/2);

  const e = document.createElement('a-entity');
  e.setAttribute('vrline', { start: a, end: b, color, opacity: 1.0 });
  scene.appendChild(e);
  return [e];
}

/* ===============================
   k-hop
=============================== */
function kHopNodes(startId, adjacency, k) {
  const seen = new Set([startId]);
  let frontier = [startId];
  for (let depth = 0; depth < k; depth++) {
    const next = [];
    for (const u of frontier) {
      const nb = adjacency[u] || [];
      for (const v of nb) {
        if (!seen.has(v)) { seen.add(v); next.push(v); }
      }
    }
    frontier = next;
    if (frontier.length === 0) break;
  }
  return seen;
}

async function fetchText(path){
  const res = await fetch(path, { cache: "no-store" });
  if (!res.ok) throw new Error(`${path} load failed: ${res.status}`);
  return await res.text();
}

function parseCSV(csvText){
  const lines = csvText.split(/\r?\n/).filter(l => l.trim().length>0);
  const header = lines[0].split(',').map(x=>x.trim());
  const rows = [];
  for (let i=1; i<lines.length; i++){
    const cols = lines[i].split(','); // 簡易（カンマ含みの厳密CSVは別途対応可）
    const obj = {};
    header.forEach((h, j) => obj[h] = (cols[j] ?? '').trim());
    rows.push(obj);
  }
  return rows;
}

async function loadLoops() {

    return parseCSV(txt);
  } catch (e) {
    console.warn("Hi-C loop file not found");
    return [];
  }
}

async function loadERBedLoops() {
  try {
    const txt = await fetchText('./IHM096M.ChromatinInteractons.bed');
    const lines = txt.split(/\r?\n/).filter(l => l.trim().length > 0);

    const loopMap = {};

    lines.forEach(line => {
      const cols = line.split(/\t/);
      if (cols.length < 4) return;

      const chr = cols[0].replace("chr", "");
      const start = Number(cols[1]);
      const end = Number(cols[2]);
      const loopName = cols[3];

      if (!loopMap[loopName]) loopMap[loopName] = [];
      loopMap[loopName].push({ chr, start, end });
    });

    const loops = [];

    Object.values(loopMap).forEach(pair => {
      if (pair.length < 2) return;

      loops.push({
        source_chr: pair[0].chr,
        source_start: pair[0].start,
        source_end: pair[0].end,
        target_chr: pair[1].chr,
        target_start: pair[1].start,
        target_end: pair[1].end,
        type: "ER_loop"
      });
    });

    return loops;

  } catch (e) {
    console.warn("ENCFF001TIB.bed not found");
    return [];
  }
}

function overlapsGene(loopAnchor, gene, windowBp = 100000) {
  if (!gene.chr || gene.start == null || gene.end == null) return false;

  const chr = String(gene.chr).replace("chr", "");
  if (String(loopAnchor.chr) !== chr) return false;

  return (
    loopAnchor.end >= gene.start - windowBp &&
    loopAnchor.start <= gene.end + windowBp
  );
}

async function loadTable(){
  // 優先：Excel（あれば）
  try{

async function ensemblLookupBatch(symbols){
  // POST /lookup/symbol/homo_sapiens
  // body: { "symbols": ["BRCA1","TP53",...] }
  const url = `https://rest.ensembl.org/lookup/symbol/homo_sapiens?content-type=application/json`;
  const body = JSON.stringify({ symbols });
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body
  });
  if (!res.ok){
    const t = await res.text().catch(()=> '');
    throw new Error(`Ensembl lookup failed: ${res.status} ${t}`);
  }
  return await res.json();
}

/* ===============================
   STRING でエッジ取得（ネットワーク）
=============================== */
async function fetchStringNetwork(symbols, opts={}){
  // 公式：/api/json/network?identifiers=...&species=9606
  // identifiersは改行区切り推奨（%0d）
  const {
    requiredScore = 700, // 0-1000（厳しめ）
    addNodes = 0,        // 0 = 追加ノードなし（自分の遺伝子集合内に限定しやすい）
    caller = 'vr-local'
  } = opts;

  const ids = symbols.map(encodeURIComponent).join('%0d');
  const url = `https://string-db.org/api/json/network?identifiers=${ids}&species=9606&required_score=${requiredScore}&add_nodes=${addNodes}&caller_identity=${encodeURIComponent(caller)}`;
  const res = await fetch(url, { cache: "no-store" });
  if (!res.ok){
    const t = await res.text().catch(()=> '');
    throw new Error(`STRING network failed: ${res.status} ${t}`);
  }
  return await res.json();
}

    `<span class="badge">HR(ET〇): ${colHRon ?? 'NA'}</span>` +
    `<span class="badge">HR(ET×): ${colHRoff ?? 'NA'}</span>` +
    `<span class="badge">deltaHR: ${colDelta ?? 'NA'}</span>`;

  // 2) Ensemblで chr/start/end を一括取得
  let mapped = 0;
  try{
    const resp = await ensemblLookupBatch(genes);
    genes.forEach(g=>{
      const x = resp[g];
      if (!x) return;
      const chr = String(x.seq_region_name ?? '').trim();
      const start = safeNum(x.start, null);
      const end   = safeNum(x.end, null);
      if (!CHR_LEN[chr] || start==null || end==null) return;
      geneData[g].chr = chr;
      geneData[g].start = start;
      geneData[g].end = end;
      mapped++;
    });
  }catch(e){
    console.warn(e);
    info.innerHTML += `<br><span class="badge">Ensembl: failed</span>`;
  }
  info.innerHTML += `<br><span class="badge">pos mapped (chr/start/end): ${mapped}</span>`;

  // 3) 染色体描画
  const tubes = drawChromosomeTubes(scene, {
    tubeR: 0.90, rodLen: 11.8, xGap: 11.5, yTop: 7.0,
    yStep: null, zPlane: 0.0, zStagger: 2.6, padding: 0.9
  });

window.currentERLoops = await loadERBedLoops();
const erLoops = window.currentERLoops;

const erLoopMeta = [];
let drawnERLoops = 0;

erLoops.forEach(r => {
  const anchorA = {
    chr: r.source_chr,
    start: r.source_start,
    end: r.source_end
  };

  const anchorB = {
    chr: r.target_chr,
    start: r.target_start,
    end: r.target_end
  };

  let hitGene = null;

  for (const g of genes) {
    const gene = geneData[g];

    if (
      overlapsGene(anchorA, gene, 100000) ||
      overlapsGene(anchorB, gene, 100000)
    ) {
      hitGene = g;
      break;
    }
  }

  if (!hitGene) return;

const a = genomeCoordToVR(r.source_chr, r.source_start, r.source_end, tubes, "loop");
const b = genomeCoordToVR(r.target_chr, r.target_start, r.target_end, tubes, "loop");

  if (!a || !b) return;

const greenLine = drawLine(scene, a, b, '#00FF99', 0.9);
const glowA = createGlowTubeForRegion(
  scene,
  r.source_chr,
  r.source_start,
  r.source_end,
  '#00FF99'
);

const glowB = createGlowTubeForRegion(
  scene,
  r.target_chr,
  r.target_start,
  r.target_end,
  '#00FF99'
);

if (glowA) glowRegionMeta.push(glowA);
if (glowB) glowRegionMeta.push(glowB);
const regionA = createLocalChromosomeRegion(
  scene,
  r.source_chr,
  r.source_start,
  r.source_end,
  tubes,
  '#00FF99'
);

const regionB = createLocalChromosomeRegion(
  scene,
  r.target_chr,
  r.target_start,
  r.target_end,
  tubes,
  '#00FF99'
);

if (regionA) localRegionMeta.push(regionA);
if (regionB) localRegionMeta.push(regionB);
setTimeout(() => {
  const obj = greenLine.getObject3D('mesh');
  if (obj) {
    obj.renderOrder = 9999;
    obj.material.depthTest = false;
    obj.material.depthWrite = false;
  }
}, 0);

erLoopMeta.push({
  line: greenLine,
  source: hitGene,
  target: hitGene
});

drawnERLoops++;
});

info.innerHTML += `<br><span class="badge">ER loops drawn: ${drawnERLoops}</span>`;

  // 4) 座標配置（start/end → x）
  const pos = {};
  layoutGenesByStartEnd(pos, geneData, tubes, { margin: 0.7, radialJitter: 1.0, axialJitter: 0.08 });

  // 5) STRINGでエッジ取得（全遺伝子間）
  info.innerHTML += `<br>STRING取得中…`;
  let stringEdges = [];
  try{
    // 大規模だとURL長制限等にかかるので、必要なら分割する
    // ここでは 200遺伝子超なら requiredScoreを上げて負荷を落とす
    const requiredScore = (genes.length > 200) ? 800 : 700;

    // identifiersが多すぎる場合に備えて分割（簡易）
    const chunks = [];
    const chunkSize = 180; // 安全寄り
    for (let i=0; i<genes.length; i+=chunkSize) chunks.push(genes.slice(i, i+chunkSize));

    const all = [];
    for (const ch of chunks){
      const res = await fetchStringNetwork(ch, { requiredScore, addNodes: 0, caller: 'vr-local' });
      all.push(...res);
    }
    // 重複除去（preferredName_A/B でキー）
    const seen = new Set();
    stringEdges = all.filter(e=>{
      const a = String(e.preferredName_A ?? '').toUpperCase();
      const b = String(e.preferredName_B ?? '').toUpperCase();
      if (!a || !b) return false;
      const k = (a < b) ? `${a}|${b}` : `${b}|${a}`;
      if (seen.has(k)) return false;
      seen.add(k);
      return true;
    });

    info.innerHTML += `<br><span class="badge">STRING edges: ${stringEdges.length}</span>`;
  }catch(e){
    console.warn(e);
    info.innerHTML += `<br><span class="badge">STRING: failed</span>`;
  }

  // 6) ノード描画
  const nodeMeta = {}; // symbol -> {sphere,label,baseEm}
  genes.forEach(g=>{
    const p = pos[g];
    const n = geneData[g];

    const col = colorForGene(n);
    const r = 0.18;
   // CNA遺伝子は強調
    let scale = "1 1 1";
    let emissivePower = 0.55;

    if(n.cna){
        scale = "1.6 1.6 1.6";
        emissivePower = 2.2;
    }
    const sphere = document.createElement('a-sphere');
    sphere.setAttribute('position', `${p.x} ${p.y} ${p.z}`);
    sphere.setAttribute('radius', String(r));
    sphere.setAttribute('color', col);
    sphere.setAttribute('emissive', col);
    sphere.setAttribute('emissive-intensity', emissivePower);
    sphere.setAttribute('scale', scale);
    sphere.setAttribute('data-id', g);
    sphere.classList.add('clickable');
    scene.appendChild(sphere);

    const label = document.createElement('a-entity');
    label.setAttribute('position', `${p.x} ${p.y + r + 0.22} ${p.z}`);
    label.setAttribute('text', { value: g, align: 'center', color: '#FFFFFF', width: 4, wrapCount: 14 });
    label.setAttribute('look-at', '#cam');
    label.setAttribute('always-on-top-text', 'renderOrder: 9999');
    scene.appendChild(label);

    nodeMeta[g] = { sphere, label, baseEm: 0.55 };
  });

  window.nodeMeta=nodeMeta;

  // 7) エッジ描画（STRING）
  const adjacency = {};
  genes.forEach(g=>adjacency[g]=[]);
  const edgeMeta = [];

  function edgeEffectFromScore(score){
    // ここは“矢印/抑制”がSTRINGには基本無いので、代替として
    // score高い→強調するだけ（矢印は無し）
    return (score >= 900) ? 'strong' : 'normal';
  }

  stringEdges.forEach(e=>{
    const a = String(e.preferredName_A ?? '').toUpperCase();
    const b = String(e.preferredName_B ?? '').toUpperCase();
    if (!pos[a] || !pos[b]) return;

    adjacency[a].push(b);
    adjacency[b].push(a);

    const s = pos[a], t = pos[b];
    const score = safeNum(e.score, 0) * 1000; // STRING jsonは0-1のことが多い

    const line = drawLine(scene, s, t, '#777', 0.45);
    const eff = edgeEffectFromScore(score);
    const markers = (eff === 'strong') ? drawArrowCenter(scene, s, t, '#FFFF55') : [];
    edgeMeta.push({ line, markers, source: a, target: b });
  });

  // 8) info表示
  function showInfo(sym){
    const n = geneData[sym];
    if (!n) return;
    const chr = n.chr ? `chr${n.chr}` : 'NA';
    const hrOn  = (n.hr_on  == null) ? 'NA' : Number(n.hr_on).toFixed(3);
    const hrOff = (n.hr_off == null) ? 'NA' : Number(n.hr_off).toFixed(3);
    const dhr   = (n.deltaHR== null) ? 'NA' : Number(n.deltaHR).toFixed(3);
    const cna = n.cna ? "YES (p≤0.05)" : "NO";
    const cna_p = n.cna_p ?? "NA";
    const start = (n.start  == null) ? 'NA' : n.start;
    const end   = (n.end    == null) ? 'NA' : n.end;

    info.innerHTML =
      `<b>${sym}</b><br>` +
      `CHR: ${chr}<br>` +
      `start-end: ${start} - ${end}<br>` +
      `HR（ET〇）: ${hrOn}<br>` +
      `HR（ET×）: ${hrOff}<br>` +
      `deltaHR: ${dhr}<br>` +
      `<span class="badge">mode color: ${modeLabel()}</span>`+
      `CNA: ${cna}<br>` +
      `CNA p-value: ${cna_p}<br>`;
  }

  // 9) hop focus
  let activeId = null;
  let hopK = 1;
  hopLabel.textContent = `hop: ${hopK}`;

  function resetFocus(){
    genes.forEach(g=>{
      const m = nodeMeta[g];
      const col = colorForGene(geneData[g]);
      m.sphere.setAttribute('visible', true);
      m.sphere.setAttribute('color', col);
      m.sphere.setAttribute('emissive', col);
      m.sphere.setAttribute('emissive-intensity', String(m.baseEm));
      m.sphere.setAttribute('scale', '1 1 1');
      m.label.setAttribute('visible', true);
    });
    
    edgeMeta.forEach(e=>{
      e.line.setAttribute('visible', true);
      e.line.setAttribute('vrline', { ...e.line.getAttribute('vrline'), color:'#777', opacity:0.45 });
      (e.markers||[]).forEach(m=>m.setAttribute('visible', true));
    });
  }
  function switchToBendingHiCAfterLayout() {
  if (localRegionMoved) return;
  localRegionMoved = true;

  const movedGenes = new Set();

  for (let i = 0; i < localRegionMeta.length; i += 2) {
    const regionA = localRegionMeta[i];
    const regionB = localRegionMeta[i + 1];

    if (!regionA || !regionB) continue;

    const centerA = regionA.center.clone();
    const centerB = regionB.center.clone();

    // 染色体片を相手側に曲げる
    bendLocalRegionToward(regionA, centerB, 0.75);
    bendLocalRegionToward(regionB, centerA, 0.75);

    const mid = centerA.clone().add(centerB).multiplyScalar(0.5);

    const shiftA = mid.clone().sub(centerA).multiplyScalar(0.35);
    const shiftB = mid.clone().sub(centerB).multiplyScalar(0.35);

    moveLocalRegion(regionA, shiftA, movedGenes);
    moveLocalRegion(regionB, shiftB, movedGenes);
  }

  info.innerHTML += `<br><span class="badge">Bending Hi-C applied: ${movedGenes.size} genes</span>`;
}
  function switchToAfterHiCLayout() {
  erLoopMeta.forEach(e => {
    const genes = e.genes || [e.source, e.target].filter(Boolean);
    if (genes.length < 2) return;

    const g1 = genes[0];
    const g2 = genes[1];

    const n1 = nodeMeta[g1];
    const n2 = nodeMeta[g2];

    if (!n1 || !n2) return;

    const p1 = n1.sphere.object3D.position;
    const p2 = n2.sphere.object3D.position;

    const mid = new THREE.Vector3(
      (p1.x + p2.x) / 2,
      (p1.y + p2.y) / 2,
      (p1.z + p2.z) / 2
    );

    const afterP1 = {
      x: p1.x + (mid.x - p1.x) * 0.5,
      y: p1.y + (mid.y - p1.y) * 0.5,
      z: p1.z + (mid.z - p1.z) * 0.5
    };

    const afterP2 = {
      x: p2.x + (mid.x - p2.x) * 0.5,
      y: p2.y + (mid.y - p2.y) * 0.5,
      z: p2.z + (mid.z - p2.z) * 0.5
    };

    n1.sphere.setAttribute('position', `${afterP1.x} ${afterP1.y} ${afterP1.z}`);
    n2.sphere.setAttribute('position', `${afterP2.x} ${afterP2.y} ${afterP2.z}`);

    n1.label.setAttribute('position', `${afterP1.x} ${afterP1.y + 0.4} ${afterP1.z}`);
    n2.label.setAttribute('position', `${afterP2.x} ${afterP2.y + 0.4} ${afterP2.z}`);

    if (typeof e.line.updateCurve === "function") {
  e.line.updateCurve(afterP1, afterP2);
}

    n1.sphere.setAttribute('emissive-intensity', '2.5');
    n2.sphere.setAttribute('emissive-intensity', '2.5');
  });
}
  function switchToHiCAfterLayout() {
  const chrShift = {};

  // 1. ER loopから、近づける染色体ペアを集計
  erLoopMeta.forEach(e => {
    if (!e.source || !e.target) return;

    const g1 = e.source;
    const g2 = e.target;

    const n1 = geneData[g1];
    const n2 = geneData[g2];

    if (!n1 || !n2 || !n1.chr || !n2.chr) return;
    if (n1.chr === n2.chr) return;

    const chrA = String(n1.chr);
    const chrB = String(n2.chr);

    if (!chrShift[chrA]) chrShift[chrA] = new THREE.Vector3(0, 0, 0);
    if (!chrShift[chrB]) chrShift[chrB] = new THREE.Vector3(0, 0, 0);

    const groupA = document.getElementById(`chrGroup_${chrA}`);
    const groupB = document.getElementById(`chrGroup_${chrB}`);

    if (!groupA || !groupB) return;

    const posA = groupA.object3D.position;
    const posB = groupB.object3D.position;

    const dirAtoB = new THREE.Vector3(
      posB.x - posA.x,
      posB.y - posA.y,
      posB.z - posA.z
    );

    if (dirAtoB.length() === 0) return;

    dirAtoB.normalize();

    // 近づける量
    const strength = 0.25;

    chrShift[chrA].add(dirAtoB.clone().multiplyScalar(strength));
    chrShift[chrB].add(dirAtoB.clone().multiplyScalar(-strength));
  });

  function switchToLocalRegionHiCAfterLayout() {
  if (localRegionMoved) return;
  localRegionMoved = true;

  const movedGenes = new Set();

  for (let i = 0; i < localRegionMeta.length; i += 2) {
    const regionA = localRegionMeta[i];
    const regionB = localRegionMeta[i + 1];

    if (!regionA || !regionB) continue;

    const centerA = regionA.center.clone();
    const centerB = regionB.center.clone();

    const mid = new THREE.Vector3(
      (centerA.x + centerB.x) / 2,
      (centerA.y + centerB.y) / 2,
      (centerA.z + centerB.z) / 2
    );

    const strength = 0.55;

    const shiftA = mid.clone().sub(centerA).multiplyScalar(strength);
    const shiftB = mid.clone().sub(centerB).multiplyScalar(strength);

    moveLocalRegion(regionA, shiftA, movedGenes);
    moveLocalRegion(regionB, shiftB, movedGenes);
  }

  info.innerHTML += `<br><span class="badge">Local region Hi-C applied: ${movedGenes.size} genes</span>`;
}

function showGlowRegions() {
  glowRegionMeta.forEach(g => {
    if (!g.mesh) return;

    g.mesh.visible = true;
    g.mesh.material.opacity = 0.75;
    g.mesh.material.needsUpdate = true;
  });

  info.innerHTML += `<br><span class="badge">Hi-C changed regions highlighted: ${glowRegionMeta.length}</span>`;
}

function hideGlowRegions() {
  glowRegionMeta.forEach(g => {
    if (!g.mesh) return;

    g.mesh.visible = false;
    g.mesh.material.opacity = 0.0;
    g.mesh.material.needsUpdate = true;
  });
}

function moveLocalRegion(region, shift, movedGenes) {
  const current = region.entity.object3D.position.clone();

  region.entity.setAttribute('animation__hic_region', {
    property: 'position',
    to: `${current.x + shift.x} ${current.y + shift.y} ${current.z + shift.z}`,
    dur: 1400,
    easing: 'easeInOutQuad'
  });

  region.genes.forEach(g => {
    const m = nodeMeta[g];
    if (!m) return;

    const p = m.sphere.object3D.position.clone();

    const afterP = {
      x: p.x + shift.x,
      y: p.y + shift.y,
      z: p.z + shift.z
    };

    m.sphere.setAttribute('animation__hic_region', {
      property: 'position',
      to: `${afterP.x} ${afterP.y} ${afterP.z}`,
      dur: 1400,
      easing: 'easeInOutQuad'
    });

    m.label.setAttribute('animation__hic_region', {
      property: 'position',
      to: `${afterP.x} ${afterP.y + 0.45} ${afterP.z}`,
      dur: 1400,
      easing: 'easeInOutQuad'
    });

    m.sphere.setAttribute('emissive-intensity', '2.8');

    movedGenes.add(g);
  });
}

  // 2. 染色体グループを移動
  Object.keys(chrShift).forEach(chr => {
    const group = document.getElementById(`chrGroup_${chr}`);
    if (!group) return;

    const p = group.object3D.position;
    const s = chrShift[chr];

    group.setAttribute('animation__hic_after', {
      property: 'position',
      to: `${p.x + s.x} ${p.y + s.y} ${p.z + s.z}`,
      dur: 1600,
      easing: 'easeInOutQuad'
    });
  });

  // 3. ER loopを強調
  erLoopMeta.forEach(e => {
    e.line.setAttribute('visible', true);
    e.line.setAttribute('vrline', {
      ...e.line.getAttribute('vrline'),
      color: '#00FF99',
      opacity: 1.0
    });
  });

  info.innerHTML += `<br><span class="badge">Hi-C after layout applied</span>`;
}

  function focusOn(id){
    if (activeId === id) { activeId = null; resetFocus(); return; }
    activeId = id;
    resetFocus();

    const cluster = kHopNodes(id, adjacency, hopK);
    const neighbors = new Set(adjacency[id] || []);
    neighbors.add(id);

    genes.forEach(g=>{
      nodeMeta[g].sphere.setAttribute('visible', false);
      nodeMeta[g].label.setAttribute('visible', false);
    });

    cluster.forEach(g=>{
      const m = nodeMeta[g];
      if (!m) return;
      m.sphere.setAttribute('visible', true);
      m.label.setAttribute('visible', true);

      if (g === id){
        m.sphere.setAttribute('emissive-intensity', '2.2');
        m.sphere.setAttribute('scale', '1.5 1.5 1.5');
      } else {
        m.sphere.setAttribute('emissive-intensity', '1.2');
        m.sphere.setAttribute('scale', '1.15 1.15 1.15');
      }
    });

    neighbors.forEach(g=>{
      const m = nodeMeta[g];
      if (m) m.label.setAttribute('visible', true);
    });

    edgeMeta.forEach(e=>{
      const keep = cluster.has(e.source) && cluster.has(e.target);
      if (keep){
        e.line.setAttribute('visible', true);
        e.line.setAttribute('vrline', { ...e.line.getAttribute('vrline'), color:'#FFFF55', opacity:1.0 });
        (e.markers||[]).forEach(m=>m.setAttribute('visible', true));
      } else {
        e.line.setAttribute('visible', false);
        (e.markers||[]).forEach(m=>m.setAttribute('visible', false));
      }
    });
  }

  // recolor
  function recolorAll(){
    genes.forEach(g=>{
      const m = nodeMeta[g];
      if (!m) return;
      const col = colorForGene(geneData[g]);
      m.sphere.setAttribute('color', col);
      m.sphere.setAttribute('emissive', col);
    });
  }
  window.recolorAll = recolorAll;

  genes.forEach(g=>{
    nodeMeta[g].sphere.addEventListener('click', ()=>{
      showInfo(g);
      focusOn(g);
    });
  });

  hopPlus.addEventListener('click', ()=>{
    hopK = Math.min(hopK + 1, 6);
    hopLabel.textContent = `hop: ${hopK}`;
    if (activeId) focusOn(activeId);
  });
  hopMinus.addEventListener('click', ()=>{
    hopK = Math.max(1, hopK - 1);
    hopLabel.textContent = `hop: ${hopK}`;
    if (activeId) focusOn(activeId);
  });

  resetAll.addEventListener('click', ()=>{
    activeId = null;
    hopK = 1;
    hopLabel.textContent = `hop: ${hopK}`;
    resetFocus();
    info.textContent = 'Resetしました。ノードをクリック：hop 以内を表示';
  });

  afterSim.addEventListener('click', () => {
  applyHiCBendingToChromosomeBody(window.currentERLoops);
});

document.getElementById("beforeSim").addEventListener("click", () => {
  restoreChromosomeBodies();
  restoreGenePositions();
  hideGlowRegions();
});

document
.getElementById("beforeSim")
.addEventListener("click",()=>{

    restoreChromosomeBodies();

    restoreGenePositions();

});

  // floor
  const floor = document.createElement('a-circle');
  floor.setAttribute('position', '0 0 0');
  floor.setAttribute('rotation', '-90 0 0');
  floor.setAttribute('radius', '60');
  floor.setAttribute('color', '#222');
  floor.setAttribute('opacity', '0.35');
  scene.appendChild(floor);

  // 初期
  setActiveMode(ColorMode.HR_ON);
  info.innerHTML += `<br>Ready ✅（ノードクリックでhop表示）`;
}

window.addEventListener('load', ()=>{
  init().catch(err=>{
    console.error(err);
    info.innerHTML =
      `<b style="color:#ff6b6b">読み込み失敗</b><br>` +
      `${String(err)}<br><br>` +
      `対策：HTMLを file:// で開かず、<br>` +
      `<b>python -m http.server</b> で http://localhost から開いてください。`;
  });
});
</script>
</body>
</html>
